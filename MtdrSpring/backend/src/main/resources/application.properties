spring.config.import=optional:file:./MtdrSpring/backend/.env[.properties],optional:file:./.env[.properties]
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
#oracle.jdbc.fanEnabled=false
##this is not used when deployed in kubernetes. Just for local testing
spring.datasource.url=jdbc:oracle:thin:@chatbottesting_medium?TNS_ADMIN=/Users/daif/Code/Tec/Semestre_6/ITESM_Oracle_OCI/MtdrSpring/backend/wallet
spring.datasource.username=ADMIN
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

##Properties of UCP
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.type=oracle.ucp.jdbc.PoolDataSource
spring.datasource.oracleucp.connection-factory-class-name=oracle.jdbc.pool.OracleDataSource
spring.datasource.oracleucp.sql-for-validate-connection=select * from dual
spring.datasource.oracleucp.connection-pool-name=connectionPoolName1
spring.datasource.oracleucp.initial-pool-size=15
spring.datasource.oracleucp.min-pool-size=10
spring.datasource.oracleucp.max-pool-size=30

##Logging properties
logging.level.root=INFO
logging.level.org.hibernate.SQL=INFO

# JWT Configuration
jwt.secret=${JWT_SECRET:}
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.api.url=https://api.deepseek.com/v1/chat/completions

#spring.security.user.name=psong
#spring.security.user.password=WELcome__12345

telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.name=${TELEGRAM_BOT_NAME:}